<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INPA – Lecture 4 MCQ Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    color: #e0e0e0;
    padding-bottom: 100px;
  }

  /* FIXED TOP BAR */
  #fixed-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(15, 32, 39, 0.97);
    border-bottom: 2px solid #00c9ff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    gap: 12px;
    flex-wrap: wrap;
  }
  #fixed-bar .bar-title {
    font-size: 1rem;
    font-weight: 700;
    color: #00c9ff;
    white-space: nowrap;
  }
  #fixed-bar .bar-score {
    font-size: 0.9rem;
    color: #92e0ff;
    white-space: nowrap;
  }
  #fixed-bar .bar-btns {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .btn-home {
    background: linear-gradient(90deg, #1a1a2e, #16213e);
    color: #00c9ff;
    border: 1.5px solid #00c9ff;
    border-radius: 8px;
    padding: 7px 18px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-home:hover { background: #00c9ff; color: #0f2027; }
  .btn-submit {
    background: linear-gradient(90deg, #f7971e, #ffd200);
    color: #1a1a2e;
    border: none;
    border-radius: 8px;
    padding: 7px 22px;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-submit:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(255,210,0,0.4); }

  /* HEADER */
  .header {
    text-align: center;
    padding: 100px 20px 30px;
  }
  .header h1 {
    font-size: 2rem;
    color: #00c9ff;
    text-shadow: 0 0 20px rgba(0,201,255,0.5);
    margin-bottom: 8px;
  }
  .header p { color: #92e0ff; font-size: 1rem; }

  /* PROGRESS */
  #progress-wrap {
    max-width: 860px;
    margin: 0 auto 18px;
    padding: 0 20px;
  }
  #progress-label { font-size: 0.85rem; color: #92e0ff; margin-bottom: 5px; }
  #progress-bar-bg {
    background: rgba(255,255,255,0.1);
    border-radius: 20px; height: 10px; overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #00c9ff, #92fe9d);
    border-radius: 20px;
    transition: width 0.4s;
    width: 0%;
  }

  /* QUIZ CONTAINER */
  #quiz-container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .question-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,201,255,0.2);
    border-radius: 14px;
    padding: 22px 26px;
    margin-bottom: 22px;
    transition: border-color 0.3s;
    position: relative;
  }
  .question-card.answered-correct { border-color: #4caf50; background: rgba(76,175,80,0.07); }
  .question-card.answered-wrong { border-color: #f44336; background: rgba(244,67,54,0.07); }

  .q-number {
    font-size: 0.75rem;
    font-weight: 700;
    color: #00c9ff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 1rem;
    font-weight: 600;
    color: #e8f4ff;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .options { display: flex; flex-direction: column; gap: 9px; }
  .option-label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 9px;
    border: 1.5px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.03);
    font-size: 0.93rem;
    line-height: 1.4;
  }
  .option-label:hover:not(.disabled) {
    border-color: #00c9ff;
    background: rgba(0,201,255,0.08);
  }
  .option-label input[type="radio"] { display: none; }
  .option-letter {
    min-width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700;
    color: #92e0ff;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option-label.correct-ans {
    border-color: #4caf50 !important;
    background: rgba(76,175,80,0.18) !important;
    color: #a5d6a7;
  }
  .option-label.correct-ans .option-letter { background: #4caf50; color: #fff; }
  .option-label.wrong-ans {
    border-color: #f44336 !important;
    background: rgba(244,67,54,0.18) !important;
    color: #ef9a9a;
  }
  .option-label.wrong-ans .option-letter { background: #f44336; color: #fff; }
  .option-label.disabled { cursor: default; }

  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 9px;
    font-size: 0.88rem;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct {
    background: rgba(76,175,80,0.15);
    border-left: 3px solid #4caf50;
    color: #a5d6a7;
  }
  .feedback.wrong {
    background: rgba(244,67,54,0.15);
    border-left: 3px solid #f44336;
    color: #ef9a9a;
  }
  .feedback .fb-icon { font-weight: 700; margin-right: 4px; }

  /* RECAP */
  #recap {
    display: none;
    max-width: 860px;
    margin: 30px auto;
    padding: 0 20px;
  }
  .recap-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,201,255,0.3);
    border-radius: 16px;
    padding: 30px;
  }
  .recap-card h2 { color: #00c9ff; font-size: 1.5rem; margin-bottom: 20px; text-align: center; }
  .recap-score-big {
    text-align: center;
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .recap-score-big span { color: #ffd200; }
  .recap-grade {
    text-align: center;
    font-size: 1.1rem;
    margin-bottom: 24px;
    color: #92e0ff;
  }
  .recap-stats {
    display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 24px;
  }
  .stat-box {
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 14px 20px;
    text-align: center;
    min-width: 100px;
    flex: 1;
  }
  .stat-box .stat-val { font-size: 1.6rem; font-weight: 800; }
  .stat-box .stat-lbl { font-size: 0.78rem; color: #92e0ff; margin-top: 3px; }
  .stat-box.green .stat-val { color: #4caf50; }
  .stat-box.red .stat-val { color: #f44336; }
  .stat-box.yellow .stat-val { color: #ffd200; }

  .recap-section-title {
    font-size: 1rem; font-weight: 700; color: #ffd200;
    margin: 20px 0 10px;
    border-bottom: 1px solid rgba(255,210,0,0.2);
    padding-bottom: 6px;
  }
  .recap-item {
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .recap-item.wrong-recap {
    background: rgba(244,67,54,0.1);
    border-left: 3px solid #f44336;
  }
  .recap-item.skipped-recap {
    background: rgba(255,152,0,0.1);
    border-left: 3px solid #ff9800;
  }
  .recap-item .ri-q { color: #e8f4ff; font-weight: 600; margin-bottom: 4px; }
  .recap-item .ri-your { color: #ef9a9a; }
  .recap-item .ri-correct { color: #a5d6a7; }
  .recap-item .ri-skip { color: #ffcc80; }

  .btn-retry {
    display: block;
    margin: 24px auto 0;
    background: linear-gradient(90deg, #00c9ff, #92fe9d);
    color: #0f2027;
    border: none;
    border-radius: 10px;
    padding: 12px 36px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-retry:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(0,201,255,0.4); }

  @media(max-width:600px){
    .header h1 { font-size: 1.4rem; }
    .question-card { padding: 16px 14px; }
    #fixed-bar .bar-title { font-size: 0.85rem; }
  }
</style>
</head>

<!-- FIXED BAR -->
<div id="fixed-bar">
  <span class="bar-title">📡 INPA – Lecture 4 Quiz</span>
  <span class="bar-score" id="live-score">Answered: 0 / 62</span>
  <div class="bar-btns">
    <a href="https://yourusername.github.io/index.html" class="btn-home" id="home-btn">🏠 Home</a>
    <button class="btn-submit" onclick="submitQuiz()">📊 Submit &amp; See Results</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>📡 INPA – Lecture 4 Quiz</h1>
  <p>TCP · UDP · ICMP · Optical Networks &nbsp;|&nbsp; 62 Questions</p>
</div>

<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-label">Progress: 0 / 62 answered</div>
  <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
</div>

<!-- QUIZ -->
<div id="quiz-container"></div>

<!-- RECAP -->
<div id="recap">
  <div class="recap-card">
    <h2>📊 Quiz Results</h2>
    <div class="recap-score-big" id="recap-score-big"></div>
    <div class="recap-grade" id="recap-grade"></div>
    <div class="recap-stats" id="recap-stats"></div>
    <div id="recap-wrong-section"></div>
    <div id="recap-skipped-section"></div>
    <button class="btn-retry" onclick="retryQuiz()">🔄 Retry Quiz</button>
  </div>
</div>

<script>
const questions = [
  // ── TCP ──────────────────────────────────────────────────────────────────
  {
    q: "Which characteristic best describes TCP?",
    opts: ["Connectionless and unreliable","Connection-oriented and reliable","Stateless and fast","Only used for video streaming"],
    ans: 1,
    exp: "TCP is connection-oriented and reliable — it ensures data delivery using acknowledgments and retransmissions."
  },
  {
    q: "TCP connections are described as 'full-duplex'. What does this mean?",
    opts: ["Data flows in one direction only","Data flows in both directions simultaneously","Data flows alternately in each direction","No data flows at all"],
    ans: 1,
    exp: "Full-duplex means both hosts can send and receive data at the same time."
  },
  {
    q: "What is the TCP three-way handshake sequence?",
    opts: ["SYN → ACK → SYN/ACK","SYN → SYN/ACK → ACK","ACK → SYN → FIN","FIN → SYN → ACK"],
    ans: 1,
    exp: "The three-way handshake is: Client sends SYN, Server replies SYN/ACK, Client sends ACK."
  },
  {
    q: "What happens when a TCP timer expires before an ACK is received?",
    opts: ["The packet is discarded permanently","The connection is closed","The packet is retransmitted","An ICMP error is sent"],
    ans: 2,
    exp: "TCP retransmits the packet and restarts the timer if no ACK is received before the timer expires."
  },
  {
    q: "Which field in the TCP header identifies the originating application?",
    opts: ["Destination Port","Sequence Number","Source Port","Checksum"],
    ans: 2,
    exp: "The Source Port field identifies the originating application/process."
  },
  {
    q: "What does the TCP Sequence Number field represent?",
    opts: ["The number of packets sent","The sequence number of the first octet in the segment","The total length of the TCP segment","The window size"],
    ans: 1,
    exp: "The Sequence Number field contains the sequence number of the first octet (byte) in the segment."
  },
  {
    q: "What does the TCP Acknowledgment Number indicate when the ACK flag is set?",
    opts: ["The number of bytes received so far","The sequence number of the next expected octet","The total window size","The checksum value"],
    ans: 1,
    exp: "The Acknowledgment Number indicates the sequence number of the next octet the receiver expects."
  },
  {
    q: "Which TCP flag is used to initiate a connection?",
    opts: ["FIN","RST","SYN","PSH"],
    ans: 2,
    exp: "The SYN flag is used to initiate (synchronize) a TCP connection."
  },
  {
    q: "Which TCP flag is used to terminate a connection gracefully?",
    opts: ["RST","FIN","SYN","URG"],
    ans: 1,
    exp: "The FIN flag signals a graceful connection termination."
  },
  {
    q: "What does the TCP Window field control?",
    opts: ["The maximum segment size","Flow control — the number of octets the receiver will accept","The number of retransmissions","The TTL of the segment"],
    ans: 1,
    exp: "The Window field specifies how many octets from the ACK number the receiver is willing to accept, enabling flow control."
  },
  {
    q: "What is the minimum size of a TCP header (without options)?",
    opts: ["8 octets","16 octets","20 octets","32 octets"],
    ans: 2,
    exp: "The minimum TCP header size is 20 octets (bytes)."
  },
  {
    q: "What does the TCP Urgent Pointer field indicate?",
    opts: ["The end of the payload","The pointer to the end of urgent data when URG flag is set","The start of the options field","The checksum offset"],
    ans: 1,
    exp: "The Urgent Pointer points to the end of urgent data and is only valid when the URG flag is set."
  },
  {
    q: "Which of the following protocols uses TCP?",
    opts: ["DNS","SNMP","HTTP","ICMP"],
    ans: 2,
    exp: "HTTP uses TCP. DNS and SNMP typically use UDP; ICMP is a separate protocol."
  },
  {
    q: "What does the PSH (Push) flag in TCP do?",
    opts: ["Resets the connection","Pushes data immediately to the receiving application","Indicates urgent data","Acknowledges received data"],
    ans: 1,
    exp: "The PSH flag tells the receiver to push buffered data immediately to the application."
  },
  {
    q: "The TCP Data Offset field indicates:",
    opts: ["The length of the payload","Where the TCP data begins (size of the header)","The window size","The sequence number offset"],
    ans: 1,
    exp: "The Data Offset field specifies the size of the TCP header in 32-bit words, indicating where the data begins."
  },
  {
    q: "Which TCP/IP version is currently in widespread use?",
    opts: ["Version 3","Version 4","Version 5","Version 6"],
    ans: 1,
    exp: "IPv4 (Version 4) is currently the dominant version in use."
  },
  {
    q: "Why has IPv6 adoption been slow?",
    opts: ["IPv6 is less secure than IPv4","IPv6 requires new software and IT staff retraining","IPv6 has fewer addresses than IPv4","IPv6 does not support TCP"],
    ans: 1,
    exp: "IPv6 adoption is slow because it requires new software and IT staff must be retrained."
  },
  {
    q: "According to experts, what is the likely future relationship between IPv4 and IPv6?",
    opts: ["IPv4 will be completely replaced by IPv6 immediately","IPv6 will coexist with IPv4 for years to come","IPv4 will replace IPv6","Neither will be used in the future"],
    ans: 1,
    exp: "Experts suggest IPv6 will most likely coexist with IPv4 for years to come."
  },
  {
    q: "TCP is described as 'stream-oriented'. This means:",
    opts: ["Data is sent as fixed-size blocks","Data can be delivered as a stream of bytes","Data is always encrypted","Data is sent in broadcast mode"],
    ans: 1,
    exp: "Stream-oriented means data can be delivered as a continuous stream of bytes."
  },
  {
    q: "What is the purpose of the TCP Checksum field?",
    opts: ["To encrypt the payload","To detect errors in the IP pseudo-header, TCP header, and data","To identify the source application","To control flow"],
    ans: 1,
    exp: "The TCP Checksum is used to detect bit errors covering the IP pseudo-header, TCP header, and data."
  },

  // ── UDP ──────────────────────────────────────────────────────────────────
  {
    q: "UDP is best described as:",
    opts: ["Connection-oriented and reliable","Connectionless and does not establish end-to-end connection management","Full-duplex and stream-oriented","Reliable with acknowledgment"],
    ans: 1,
    exp: "UDP is connectionless — it does not establish any end-to-end connection or check received packets."
  },
  {
    q: "In UDP, who is responsible for handling packet loss?",
    opts: ["The network stack","The router","The application","The IP layer"],
    ans: 2,
    exp: "In UDP, packet loss is better handled by the application rather than the network stack."
  },
  {
    q: "What is the size of the UDP header?",
    opts: ["4 octets","8 octets","16 octets","20 octets"],
    ans: 1,
    exp: "The UDP header is 8 octets (bytes)."
  },
  {
    q: "What does the UDP Length field contain?",
    opts: ["Length of the UDP payload only","Length of the entire UDP segment (header + data)","Length of the IP header","Length of the data only"],
    ans: 1,
    exp: "The UDP Length field contains the length of the entire UDP segment including both header and data."
  },
  {
    q: "Which of the following protocols uses UDP?",
    opts: ["HTTP","FTP","SMTP","DNS"],
    ans: 3,
    exp: "DNS uses UDP. HTTP, FTP, and SMTP use TCP."
  },
  {
    q: "What error-checking algorithm does UDP use for its checksum?",
    opts: ["CRC-32","MD5","One's complement","Two's complement"],
    ans: 2,
    exp: "UDP uses the one's complement algorithm for its checksum, the same as TCP and IPv4."
  },
  {
    q: "In the UDP checksum example, what is the first step when computing the checksum?",
    opts: ["Apply one's complement to the bit stream directly","Divide the bit stream into two 16-bit parts","Add all 32 bits together","XOR the two halves"],
    ans: 1,
    exp: "The first step is to divide the bit stream into two 16-bit parts, then add them using binary addition."
  },
  {
    q: "After computing the UDP checksum, what should the receiver get when adding the sum and checksum?",
    opts: ["All zeros","All ones","The original data","The sequence number"],
    ans: 1,
    exp: "The receiver adds the sum and checksum; if there are no errors, the result should be all 1s."
  },
  {
    q: "When is the use of the UDP checksum field optional?",
    opts: ["Always","When transmitting over LAN (e.g., Ethernet which has its own checksum)","When using TCP","When the payload is empty"],
    ans: 1,
    exp: "UDP checksum use is optional over LAN because Ethernet already provides its own error checking."
  },
  {
    q: "What happens when UDP detects an error via checksum?",
    opts: ["The packet is retransmitted automatically","The packet is discarded; no error recovery is taken","An ACK is sent","A SYN is sent to restart"],
    ans: 1,
    exp: "If a UDP checksum error is detected, the packet is discarded with no error recovery action."
  },
  {
    q: "Why might an application prefer UDP over TCP?",
    opts: ["UDP is more reliable","UDP avoids the overhead of connection setup","UDP supports more ports","UDP has a larger header"],
    ans: 1,
    exp: "UDP avoids the overhead of connection setup, making it faster for applications that handle their own reliability."
  },
  {
    q: "Which field is present in UDP but NOT in TCP?",
    opts: ["Source Port","Destination Port","Length","Sequence Number"],
    ans: 2,
    exp: "UDP has a Length field. TCP does not have a dedicated Length field (it uses Data Offset instead)."
  },
  {
    q: "What does 'wrap around' mean in the context of UDP checksum binary addition?",
    opts: ["The carry bit from a 16-bit addition is discarded","The carry bit is added back to the result","The bits are reversed","The sum is reset to zero"],
    ans: 1,
    exp: "In one's complement addition, if the sum exceeds 16 bits, the carry bit wraps around and is added back to the lower 16 bits."
  },

  // ── ICMP ─────────────────────────────────────────────────────────────────
  {
    q: "What is the primary purpose of ICMP?",
    opts: ["To transfer application data","To send error messages and operational information about IP communication","To establish TCP connections","To assign IP addresses"],
    ans: 1,
    exp: "ICMP is used to send error messages and operational information (not application data) about IP communication."
  },
  {
    q: "ICMP was specified in which RFC for IPv4?",
    opts: ["RFC 791","RFC 792","RFC 793","RFC 1918"],
    ans: 1,
    exp: "ICMP for IPv4 was specified in RFC 792."
  },
  {
    q: "ICMP Type 8 and Type 0 correspond to which use case?",
    opts: ["Destination Unreachable","Time Exceeded","Echo Request and Echo Reply (PING)","Redirect"],
    ans: 2,
    exp: "ICMP Type 8 is Echo Request and Type 0 is Echo Reply — these are used by the PING command."
  },
  {
    q: "What ICMP type is sent when a destination is unreachable?",
    opts: ["Type 0","Type 3","Type 8","Type 11"],
    ans: 1,
    exp: "ICMP Type 3 is 'Destination Unreachable'."
  },
  {
    q: "What ICMP type is sent when a packet's TTL reaches zero?",
    opts: ["Type 0","Type 3","Type 8","Type 11"],
    ans: 3,
    exp: "ICMP Type 11 is 'Time Exceeded', sent when a packet's TTL reaches zero."
  },
  {
    q: "What is the size of the ICMP header?",
    opts: ["4 octets","6 octets","8 octets","20 octets"],
    ans: 2,
    exp: "The ICMP header is 8 octets."
  },
  {
    q: "Which fields are in the ICMP header?",
    opts: ["Source Port, Destination Port, Length, Checksum","Type, Code, Checksum, Identifier, Sequence Number","SYN, ACK, FIN, RST","Source IP, Destination IP, TTL, Protocol"],
    ans: 1,
    exp: "The ICMP header contains: Type, Code, Checksum, Identifier, and Sequence Number."
  },
  {
    q: "Does ICMP correct the network problem it reports?",
    opts: ["Yes, it automatically reroutes packets","Yes, it retransmits lost packets","No, it only reports the problem to the source","No, it discards the packet silently"],
    ans: 2,
    exp: "ICMP only reports the problem to the source device; it does not correct the network problem."
  },
  {
    q: "ICMP uses which protocol to route its messages between hosts?",
    opts: ["TCP","UDP","IP","ARP"],
    ans: 2,
    exp: "ICMP uses IP to route its messages between hosts."
  },
  {
    q: "Why does IP need ICMP?",
    opts: ["IP has no native mechanism to notify the source host of delivery failures","IP cannot route packets","IP does not support checksums","IP only works on LANs"],
    ans: 0,
    exp: "IP has no native mechanism for source host notification of delivery failures — ICMP fills this gap."
  },
  {
    q: "Which ICMP code indicates 'Host Unreachable' within Type 3?",
    opts: ["Code 0","Code 1","Code 3","Code 5"],
    ans: 1,
    exp: "Within ICMP Type 3 (Destination Unreachable), Code 1 means 'Host Unreachable'."
  },
  {
    q: "Which ICMP code indicates 'Port Unreachable' within Type 3?",
    opts: ["Code 0","Code 1","Code 3","Code 5"],
    ans: 2,
    exp: "Within ICMP Type 3 (Destination Unreachable), Code 3 means 'Port Unreachable'."
  },
  {
    q: "Which ICMP code indicates 'Network Unreachable' within Type 3?",
    opts: ["Code 0","Code 1","Code 3","Code 5"],
    ans: 0,
    exp: "Within ICMP Type 3 (Destination Unreachable), Code 0 means 'Network Unreachable'."
  },
  {
    q: "What command uses ICMP Echo Request (Type 8) and Echo Reply (Type 0)?",
    opts: ["TRACERT","NETSTAT","PING","IPCONFIG"],
    ans: 2,
    exp: "The PING command uses ICMP Echo Request (Type 8) and Echo Reply (Type 0)."
  },
  {
    q: "What command uses ICMP Time Exceeded messages to trace the route to a destination?",
    opts: ["PING","TRACERT / TRACEROUTE","NETSTAT","ARP"],
    ans: 1,
    exp: "TRACERT (Windows) / TRACEROUTE (Linux/Mac) uses ICMP Time Exceeded messages to trace the route."
  },
  {

// Shuffle utility
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// State
let userAnswers = new Array(questions.length).fill(null);
let answered = 0;
const LETTERS = ['A','B','C','D','E'];

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + qi;

    const qNum = document.createElement('div');
    qNum.className = 'q-number';
    qNum.textContent = 'Question ' + (qi + 1) + ' of ' + questions.length;

    const qText = document.createElement('div');
    qText.className = 'q-text';
    qText.textContent = q.q;

    const opts = document.createElement('div');
    opts.className = 'options';

    q.opts.forEach((opt, oi) => {
      const lbl = document.createElement('label');
      lbl.className = 'option-label';
      lbl.id = 'opt-' + qi + '-' + oi;
      lbl.innerHTML = '<input type="radio" name="q' + qi + '" value="' + oi + '"><span class="option-letter">' + LETTERS[oi] + '</span><span>' + opt + '</span>';
      lbl.addEventListener('click', () => selectAnswer(qi, oi));
      opts.appendChild(lbl);
    });

    const feedback = document.createElement('div');
    feedback.className = 'feedback';
    feedback.id = 'fb-' + qi;

    card.appendChild(qNum);
    card.appendChild(qText);
    card.appendChild(opts);
    card.appendChild(feedback);
    container.appendChild(card);
  });
  updateProgress();
}

function selectAnswer(qi, oi) {
  if (userAnswers[qi] !== null) return; // already answered

  userAnswers[qi] = oi;
  answered++;

  const q = questions[qi];
  const card = document.getElementById('card-' + qi);
  const fb = document.getElementById('fb-' + qi);
  const isCorrect = oi === q.ans;

  // Disable all options
  q.opts.forEach((_, idx) => {
    const lbl = document.getElementById('opt-' + qi + '-' + idx);
    lbl.classList.add('disabled');
    if (idx === q.ans) lbl.classList.add('correct-ans');
    else if (idx === oi && !isCorrect) lbl.classList.add('wrong-ans');
  });

  // Feedback
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = (isCorrect
    ? '<span class="fb-icon">✅ Correct!</span> '
    : '<span class="fb-icon">❌ Incorrect.</span> Correct answer: <strong>' + LETTERS[q.ans] + '. ' + q.opts[q.ans] + '</strong><br>')
    + q.exp;

  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  updateProgress();
}

function updateProgress() {
  const total = questions.length;
  const done = userAnswers.filter(a => a !== null).length;
  document.getElementById('progress-label').textContent = 'Progress: ' + done + ' / ' + total + ' answered';
  document.getElementById('progress-bar-fill').style.width = (done / total * 100) + '%';
  document.getElementById('live-score').textContent = 'Answered: ' + done + ' / ' + total;
}

function submitQuiz() {
  const total = questions.length;
  let correct = 0;
  let wrongList = [];
  let skippedList = [];

  questions.forEach((q, qi) => {
    const ua = userAnswers[qi];
    if (ua === null) {
      skippedList.push({qi, q});
    } else if (ua === q.ans) {
      correct++;
    } else {
      wrongList.push({qi, q, ua});
    }
  });

  const pct = Math.round(correct / total * 100);
  let grade = '';
  if (pct >= 90) grade = '🏆 Excellent! Outstanding performance!';
  else if (pct >= 75) grade = '🎉 Good job! Keep it up!';
  else if (pct >= 60) grade = '👍 Passing. Review the topics below.';
  else grade = '📚 Needs improvement. Focus on the highlighted topics.';

  document.getElementById('recap-score-big').innerHTML = '<span>' + correct + '</span> / ' + total + ' &nbsp;(' + pct + '%)';
  document.getElementById('recap-grade').textContent = grade;

  document.getElementById('recap-stats').innerHTML =
    '<div class="stat-box green"><div class="stat-val">' + correct + '</div><div class="stat-lbl">Correct</div></div>' +
    '<div class="stat-box red"><div class="stat-val">' + wrongList.length + '</div><div class="stat-lbl">Wrong</div></div>' +
    '<div class="stat-box yellow"><div class="stat-val">' + skippedList.length + '</div><div class="stat-lbl">Skipped</div></div>';

  // Wrong section
  let wrongHTML = '';
  if (wrongList.length > 0) {
    wrongHTML = '<div class="recap-section-title">❌ Questions You Got Wrong (' + wrongList.length + ')</div>';
    wrongList.forEach(({qi, q, ua}) => {
      wrongHTML += '<div class="recap-item wrong-recap">' +
        '<div class="ri-q">Q' + (qi+1) + ': ' + q.q + '</div>' +
        '<div class="ri-your">Your answer: ' + LETTERS[ua] + '. ' + q.opts[ua] + '</div>' +
        '<div class="ri-correct">✅ Correct: ' + LETTERS[q.ans] + '. ' + q.opts[q.ans] + '</div>' +
        '<div style="color:#b0bec5;font-size:0.83rem;margin-top:4px;">' + q.exp + '</div>' +
        '</div>';
    });
  }
  document.getElementById('recap-wrong-section').innerHTML = wrongHTML;

  // Skipped section
  let skipHTML = '';
  if (skippedList.length > 0) {
    skipHTML = '<div class="recap-section-title">⏭️ Skipped Questions (' + skippedList.length + ')</div>';
    skippedList.forEach(({qi, q}) => {
      skipHTML += '<div class="recap-item skipped-recap">' +
        '<div class="ri-q">Q' + (qi+1) + ': ' + q.q + '</div>' +
        '<div class="ri-skip">Not answered</div>' +
        '<div class="ri-correct">✅ Correct: ' + LETTERS[q.ans] + '. ' + q.opts[q.ans] + '</div>' +
        '</div>';
    });
  }
  document.getElementById('recap-skipped-section').innerHTML = skipHTML;

  document.getElementById('recap').style.display = 'block';
  document.getElementById('recap').scrollIntoView({behavior: 'smooth'});
}

function retryQuiz() {
  userAnswers = new Array(questions.length).fill(null);
  answered = 0;
  document.getElementById('recap').style.display = 'none';
  buildQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildQuiz();
</script>
