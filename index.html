<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Bài giảng MCQ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }

        /* Chia cột bằng Grid */
        .container {
            display: grid;
            /* Tự động chia cột: tối thiểu 250px mỗi cột */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .quiz-link {
            background-color: #ffffff;
            color: #3498db;
            text-decoration: none;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            border: 2px solid #3498db;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .quiz-link:hover {
            background-color: #3498db;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* Màu sắc khác nhau cho từng nhóm nếu muốn */
        .quiz-link:nth-child(odd) {
            border-color: #2ecc71;
            color: #2ecc71;
        }
        .quiz-link:nth-child(odd):hover {
            background-color: #2ecc71;
            color: white;
        }
    </style>
</head>
<body>

    <h1>NPA MCQ Dashboard</h1>

    <div class="container">
        <a href="npa_quiz1.html" class="quiz-link">NPA Quiz 1</a>
        <a href="npa_quiz2.html" class="quiz-link">NPA Quiz 2</a>
        <a href="npa_quiz3.html" class="quiz-link">NPA Quiz 3</a>
        <a href="npa_quiz4.html" class="quiz-link">NPA Quiz 4</a>
        <a href="npa_quiz5.html" class="quiz-link">NPA Quiz 5</a>
        <a href="npa_quiz6.html" class="quiz-link">NPA Quiz 6</a>
        <a href="npa_quiz7.html" class="quiz-link">NPA Quiz 7</a>
        <a href="npa_quiz8.html" class="quiz-link">NPA Quiz 8</a>
    </div>

</body>
</html>
